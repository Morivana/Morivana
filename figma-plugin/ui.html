<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0d1f0d;
    color: #f5f0dc;
    padding: 20px;
    width: 280px;
  }
  .logo { font-size: 28px; font-weight: 900; color: #c8e630; letter-spacing: 0.05em; margin-bottom: 4px; }
  .sub  { font-size: 11px; color: #8bc34a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px; }
  p     { font-size: 12px; color: #f5f0dc; opacity: 0.75; line-height: 1.6; margin-bottom: 20px; }
  button {
    width: 100%; padding: 14px; border: none; border-radius: 999px;
    background: #c8e630; color: #0d1f0d;
    font-weight: 800; font-size: 13px; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #8bc34a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin-top: 14px; font-size: 11px; color: #c8e630; min-height: 16px; text-align: center; }
  .warn { font-size: 10px; color: #a8c020; opacity: 0.7; margin-top: 12px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="logo">MORIVANA</div>
  <div class="sub">Design Generator</div>
  <p>Generates the complete Morivana "Launching Soon" website design — all 8 sections, design tokens, components, and typography across 2 pages (Desktop 1440px + Mobile 390px).</p>
  <button id="run" onclick="generate()">⚡ Generate Full Design</button>
  <div id="status"></div>
  <p class="warn">⚠ Needs Bebas Neue, Barlow Condensed &amp; Barlow fonts installed in Figma. Takes ~10 seconds.</p>

  <script>
    function generate() {
      document.getElementById('run').disabled = true;
      document.getElementById('status').textContent = 'Building…';
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    }
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      document.getElementById('status').textContent = msg.text || '';
      if (msg.done) {
        document.getElementById('run').disabled = false;
        document.getElementById('run').textContent = '✓ Done — check your canvas!';
      }
    };
  </script>
</body>
</html>
